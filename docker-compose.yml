version: '3.8'

services:
  video-db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: video_db
    ports:
      - "3306:3306"
    volumes:
      - video-db-data:/var/lib/mysql

  user-db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: user_db
    ports:
      - "3307:3306"
    volumes:
      - user-db-data:/var/lib/mysql

volumes:
  video-db-data:
  user-db-data:
