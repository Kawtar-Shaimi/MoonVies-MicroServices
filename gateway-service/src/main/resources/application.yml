server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: video-service
          uri: lb://video-service
          predicates:
            - Path=/videos/**
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/users/**
            - Path=/watchlists/**
            - Path=/history/**

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
